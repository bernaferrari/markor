name: Deploy Web to Vercel

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: vercel-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: KMP web CI/CD
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run common tests and build web dist
        run: >-
          ./gradlew :shared:wasmJsBrowserTest :webApp:wasmJsBrowserDistribution
          --no-daemon --parallel --build-cache --configuration-cache

      - name: Verify web dist
        run: ./scripts/verify-web-deploy.sh --ci --skip-build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./scripts/deploy-web-vercel.sh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        run: ./scripts/deploy-web-vercel.sh --preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
