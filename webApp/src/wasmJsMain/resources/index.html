<!DOCTYPE html>
<html lang="en" style="background:#121212;color-scheme:dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <base href="/">
    <title>Markor — Web Demo</title>
    <meta name="description" content="Re-Markor is a local-first, Markdown-centric notes app for Android, iOS, and the web.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://markor-five.vercel.app/">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Markor">
    <meta property="og:title" content="Markor — Local-first Markdown notes">
    <meta property="og:description" content="A local-first, Markdown-centric notes app for Android, iOS, and the web.">
    <meta property="og:url" content="https://markor-five.vercel.app/">
    <meta property="og:image" content="https://markor-five.vercel.app/opengraph-image.png">
    <meta property="og:image:width" content="1280">
    <meta property="og:image:height" content="640">
    <meta property="og:image:alt" content="Markor Markdown notes overview">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Markor — Local-first Markdown notes">
    <meta name="twitter:description" content="A local-first, Markdown-centric notes app for Android, iOS, and the web.">
    <meta name="twitter:image" content="https://markor-five.vercel.app/opengraph-image.png">
    <meta name="twitter:image:alt" content="Markor Markdown notes overview">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            "name": "Markor",
            "applicationCategory": "ProductivityApplication",
            "operatingSystem": "Android, iOS, Web",
            "description": "A local-first, Markdown-centric notes app for Android, iOS, and the web.",
            "url": "https://markor-five.vercel.app/",
            "image": "https://markor-five.vercel.app/opengraph-image.png",
            "sameAs": ["https://github.com/bernaferrari/markor"]
        }
    </script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #121212;
        }
        #loading {
            color: #e8e8e8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            width: 100%;
            height: 100%;
            background: #121212;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(232, 232, 232, 0.15);
            border-top-color: #90caf9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .label {
            margin: 0;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div id="loading" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <p class="label">Loading Markor…</p>
</div>
<script src="markor.js"></script>
</body>
</html>
